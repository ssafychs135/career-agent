server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;   # 향후 리서치 등 느린 응답 대비
    }

    # 해시 파일명(index-XXXXXXX.js/css)이라 내용이 바뀌면 이름도 바뀐다 → 영구 캐시가 안전.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html은 매번 재검증. 캐시되면 배포 후에도 옛 해시 에셋을 계속 참조해
    # 사용자가 하드 리프레시해야만 새 번들을 본다(Cache-Control 없으면 브라우저가
    # Last-Modified 기반 휴리스틱 캐싱을 적용함).
    # try_files의 SPA 폴백도 내부 리다이렉트로 이 location을 거친다.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback
    }
}
